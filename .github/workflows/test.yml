name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Bats Tests
    runs-on: ${{ vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Validate rules files
        run: python3 tools/generate-rules.py --check --verbose

      - name: Run tests
        run: bats tests/

      - name: Test scripts help
        run: |
          ./attach.sh --help
          ./agents/claude.sh --help
          ./agents/gemini.sh --help

  regenerate-rules:
    name: Regenerate Compact Rules (changed only)
    runs-on: ${{ vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      !contains(github.event.head_commit.message, '[skip ci]')
    needs: test
    continue-on-error: true
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ steps.app-token.outputs.token }}

      - name: Install dependencies
        run: pip install --break-system-packages anthropic

      - name: Regenerate changed rules
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 tools/generate-rules.py --verbose

      - name: Commit and push if changed
        run: |
          if ! git diff --quiet standards/rules/; then
            git config user.name "hyperi-bot[bot]"
            git config user.email "hyperi-bot[bot]@users.noreply.github.com"
            git add standards/rules/
            git commit -m "chore: regenerate compact rules [skip ci]"
            git push
          fi
